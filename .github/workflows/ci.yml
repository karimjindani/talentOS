name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Typecheck, lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  realm-import:
    name: Validate Keycloak realm import
    runs-on: ubuntu-latest
    # Boots Keycloak against keycloak/import the same way production does
    # (start-dev --import-realm) so a malformed realm JSON — e.g. an unknown
    # ClientRepresentation field — fails CI instead of crash-looping on deploy (D-057).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Boot Keycloak with the realm import
        run: |
          docker run -d --name kc-realm-check \
            -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
            -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
            -e KC_HTTP_ENABLED=true \
            -e KC_HOSTNAME_STRICT=false \
            -v "$PWD/keycloak/import:/opt/keycloak/data/import:ro" \
            -p 8080:8080 \
            quay.io/keycloak/keycloak:26.0 start-dev --import-realm

      - name: Verify the talentos realm imports cleanly
        run: |
          ok=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/realms/talentos/.well-known/openid-configuration >/dev/null 2>&1; then
              ok=1; break
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' kc-realm-check 2>/dev/null)" != "true" ]; then
              break
            fi
            sleep 3
          done
          echo "----- Keycloak logs (tail) -----"
          docker logs kc-realm-check 2>&1 | tail -50
          if docker logs kc-realm-check 2>&1 | grep -qiE 'Failed to run import|Unrecognized field|Failed to start server in'; then
            echo "::error::Keycloak realm import failed — see logs above"
            exit 1
          fi
          if [ "$ok" != "1" ]; then
            echo "::error::Keycloak did not become ready / realm 'talentos' not reachable"
            exit 1
          fi
          echo "Realm 'talentos' imported cleanly and is reachable."

      - name: Tear down
        if: always()
        run: docker rm -f kc-realm-check 2>/dev/null || true
