services:
  postgres:
    image: postgres:16-alpine
    container_name: talentos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talentos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-talentos_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-talentos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talentos} -d ${POSTGRES_DB:-talentos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: talentos-keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KC_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak_dev_password}
      POSTGRES_DB: ${KC_DB_NAME:-keycloak}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak} -d ${KC_DB_NAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: talentos-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak_dev_password}
      KC_HOSTNAME: ${KC_HOSTNAME:-http://keycloak.lvh.me:8080}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: talentos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-talentos}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-talentos_dev_password}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: talentos-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-talentos} ${S3_SECRET_ACCESS_KEY:-talentos_dev_password};
      mc mb --ignore-existing local/${S3_BUCKET:-talentos};
      mc anonymous set none local/${S3_BUCKET:-talentos};
      echo 'MinIO bucket ready';
      "

  applicant:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: "@talentos/applicant"
        APP_DIR: apps/applicant
    container_name: talentos-applicant
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_started
    extra_hosts:
      - "keycloak.lvh.me:host-gateway"
      - "minio.lvh.me:host-gateway"
    environment:
      NODE_ENV: production
      # Bind the Next.js standalone server to all interfaces. Without this it inherits Docker's
      # HOSTNAME=<container-id> and tries to bind to that name, which fails DNS resolution
      # (getaddrinfo EAI_AGAIN) non-deterministically on boot.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-talentos}:${POSTGRES_PASSWORD:-talentos_dev_password}@postgres:5432/${POSTGRES_DB:-talentos}?schema=public
      AUTH_SECRET: ${NEXTAUTH_SECRET:-replace-with-a-long-random-secret}
      # Login runs through this single canonical host; the session cookie is scoped to
      # APP_BASE_DOMAIN so it is valid on every tenant subdomain (sbp.lvh.me, …) and the user is
      # redirected back to their tenant after signing in (v0.12.1, D-060). lvh.me + *.lvh.me both
      # resolve to 127.0.0.1 with no host-file setup.
      AUTH_URL: ${NEXTAUTH_URL:-http://lvh.me:3100}
      AUTH_TRUST_HOST: "true"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://keycloak.lvh.me:8080/realms/talentos}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_APPLICANT_CLIENT_ID:-talentos-applicant}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_APPLICANT_CLIENT_SECRET:-talentos-applicant-secret}
      APP_BASE_DOMAIN: ${APP_BASE_DOMAIN:-lvh.me}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-demo}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio.lvh.me:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-talentos}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-talentos_dev_password}
      S3_BUCKET: ${S3_BUCKET:-talentos}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # AI Mentor — GLM_Z.ai / Z.AI (Phase 6)
      GLM_Z_API_KEY: ${GLM_Z_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      AI_MODEL: ${AI_MODEL:-glm-5.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
    ports:
      - "${APPLICANT_PORT:-3100}:3000"

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: "@talentos/admin"
        APP_DIR: apps/admin
    container_name: talentos-admin
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_started
    extra_hosts:
      - "keycloak.lvh.me:host-gateway"
      - "minio.lvh.me:host-gateway"
    environment:
      NODE_ENV: production
      # Bind the Next.js standalone server to all interfaces (see applicant note above).
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-talentos}:${POSTGRES_PASSWORD:-talentos_dev_password}@postgres:5432/${POSTGRES_DB:-talentos}?schema=public
      AUTH_SECRET: ${NEXTAUTH_SECRET:-replace-with-a-long-random-secret}
      # Canonical login host; session cookie scoped to APP_BASE_DOMAIN so an org admin signing in is
      # returned to their tenant subdomain (e.g. sbp.lvh.me:3200) with a valid session — the fix for
      # the "not a member of this organization" denial (v0.12.1, D-060).
      AUTH_URL: ${ADMIN_NEXTAUTH_URL:-http://lvh.me:3200}
      AUTH_TRUST_HOST: "true"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://keycloak.lvh.me:8080/realms/talentos}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-talentos-admin}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-talentos-admin-secret}
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak.lvh.me:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-talentos}
      KEYCLOAK_PROVISIONER_CLIENT_ID: ${KEYCLOAK_PROVISIONER_CLIENT_ID:-talentos-provisioner}
      KEYCLOAK_PROVISIONER_CLIENT_SECRET: ${KEYCLOAK_PROVISIONER_CLIENT_SECRET:-talentos-provisioner-secret}
      APP_BASE_DOMAIN: ${APP_BASE_DOMAIN:-lvh.me}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-demo}
      NEXT_PUBLIC_APPLICANT_URL: ${NEXT_PUBLIC_APPLICANT_URL:-http://localhost:3100}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio.lvh.me:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-talentos}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-talentos_dev_password}
      S3_BUCKET: ${S3_BUCKET:-talentos}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    ports:
      - "${ADMIN_PORT:-3200}:3000"

volumes:
  postgres-data:
  keycloak-postgres-data:
  minio-data:
